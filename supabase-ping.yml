name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 0 * * 1,4'  # 매주 월, 목 자정(UTC) 실행 → 최대 간격 4일
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/settings?select=key&limit=1"
          echo "Ping 완료: $(date)"
